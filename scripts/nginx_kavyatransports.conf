# ============================================================
# Nginx — Kavya Transports ERP Production Config
# /etc/nginx/sites-available/kavyatransports.com
#
# Certbot:
#   sudo certbot --nginx -d kavyatransports.com -d www.kavyatransports.com
# Enable:
#   sudo ln -s /etc/nginx/sites-available/kavyatransports.com \
#              /etc/nginx/sites-enabled/kavyatransports.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certbot auto-renewal cron (run as root):
#   0 3 * * * /usr/bin/certbot renew --quiet --post-hook "systemctl reload nginx"
# ============================================================

# ── Rate limit zones (must be in http{} context in nginx.conf or here via include) ─
limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── Gzip ─────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_proxied any;
gzip_comp_level 5;
gzip_types
    application/json
    application/javascript
    text/css
    text/plain
    text/xml
    image/svg+xml;

# ── Log format with request timing ───────────────────────────
log_format kavya_main '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name kavyatransports.com www.kavyatransports.com;

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kavyatransports.com www.kavyatransports.com;

    # ── SSL — managed by certbot ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/kavyatransports.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kavyatransports.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── TLS hardening ────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── General ──────────────────────────────────────────
    server_tokens off;
    client_max_body_size 10M;

    access_log /var/log/nginx/kavya_access.log kavya_main;
    error_log  /var/log/nginx/kavya_error.log  warn;

    # ── Security headers ─────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss://kavyatransports.com https://api.razorpay.com; frame-src https://api.razorpay.com; object-src 'none'; base-uri 'self';"
        always;

    # ── Block sensitive file/path access ─────────────────
    location ~* /\.(env|git|htaccess|htpasswd|svn|DS_Store) {
        deny all;
        return 444;
    }
    location ~* \.(log|sql|key|pem|bak|sh|py|conf\.bak)$ {
        deny all;
        return 444;
    }
    location ~* ^/(wp-admin|phpmyadmin|adminer|xmlrpc\.php) {
        return 444;
    }

    # ── WebSocket ─────────────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Health endpoints (no rate limit) ─────────────────
    location ~* ^/health {
        proxy_pass          http://127.0.0.1:8000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  10;
        proxy_connect_timeout 5;
        access_log off;
    }

    # ── Auth API — strict rate limiting ───────────────────
    location ~* ^/api/v1/auth {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass          http://127.0.0.1:8000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30;
        proxy_connect_timeout 5;
    }

    # ── All other API endpoints ───────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass          http://127.0.0.1:8000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120;
        proxy_connect_timeout 5;
    }

    # ── Uploads served by FastAPI ─────────────────────────
    location /uploads/ {
        proxy_pass          http://127.0.0.1:8000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── React SPA — hashed static assets (immutable) ─────
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif|map)$ {
        root /var/www/kavya/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── React SPA — index.html (no cache) ────────────────
    location / {
        root  /var/www/kavya/frontend/dist;
        index index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri $uri/ /index.html;
    }
}
