name: kavya_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  lottie: ^3.3.2

  # State Management & Routing
  flutter_riverpod: ^2.6.1                # Downgraded from 3.x to 2.x
  riverpod_annotation: ^2.6.1             # Corrected from non‑existent 4.x
  go_router: ^17.1.0

  # Networking
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^7.0.0
  web_socket_channel: ^3.0.2

  # Storage
  flutter_secure_storage: ^10.0.0
  hive_flutter: ^1.1.0

  # Maps & Location
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_staggered_animations: ^1.1.1

  # Charts & Data
  fl_chart: ^1.2.0
  intl: ^0.20.2

  # Media & Camera
  image_picker: ^1.2.1
  camera: ^0.12.0
  qr_flutter: ^4.1.0

  # Sharing & Utilities
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  device_info_plus: ^11.2.0
  debounce_throttle: ^2.0.0
  local_auth: ^2.3.0

  # Push Notifications
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^20.1.0

  # Background Services & Permissions
  flutter_background_service: ^5.1.0
  permission_handler: ^12.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13                   # Added
  riverpod_generator: ^2.4.0              # Added
  hive_generator: ^2.0.1                  # Added

  # Linting
  flutter_lints: ^5.0.0

  # Launcher icons
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/truck-hero.png